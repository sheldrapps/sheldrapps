<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="today">
      <ion-icon name="calendar-outline"></ion-icon>
      <ion-label>{{ 'TABS.TODAY' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="agenda">
      <ion-icon name="list-outline"></ion-icon>
      <ion-label>{{ 'TABS.AGENDA' | translate }}</ion-label>
    </ion-tab-button>


    <ion-tab-button tab="tasks">
      <ion-icon name="checkbox-outline"></ion-icon>
      <ion-label>{{ 'TABS.TASKS' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="reflection">
      <ion-icon name="create-outline"></ion-icon>
      <ion-label>{{ 'TABS.REFLECTION' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="settings">
      <ion-icon name="settings-outline"></ion-icon>
      <ion-label>{{ 'TABS.SETTINGS' | translate }}</ion-label>
    </ion-tab-button>

  </ion-tab-bar>
</ion-tabs>
