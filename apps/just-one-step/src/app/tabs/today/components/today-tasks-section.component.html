@if (todayItems.length > 0) {
  <section class="app-section today-section today-section--tasks">
    <h2 class="today-section__title">{{ 'TODAY.TODAY_TASKS.TITLE' | translate }}</h2>
    <div class="today-list">
      @for (item of todayItems; track item.taskId) {
        <app-today-standard-card
          [title]="item.title"
          [durationLabel]="item.durationLabel"
          [timeLabel]="item.timeLabel"
          [color]="item.color"
          [priorityCode]="item.priorityCode"
          [priorityLabel]="item.priorityLabel"
          [sizeTier]="item.sizeTier"
          [completed]="item.completed"
          [interactive]="true"
          [expanded]="expandedTaskId === item.taskId"
          (cardClick)="toggleExpand(item.taskId)"
        >
          @if (expandedTaskId === item.taskId) {
            <div todayCardActions class="today-tasks-item__actions">
              <ion-button
                class="app-btn"
                expand="block"
                [disabled]="startNowDisabled"
                (click)="onStartNow(item)"
              >
                {{ 'TODAY.UPCOMING_START_NOW' | translate }}
              </ion-button>
              @if (startNowDisabled) {
                <p class="today-start-now-hint">
                  {{ 'TODAY.START_NOW_BLOCKED_RUNNING' | translate }}
                </p>
              }
            </div>
          }
        </app-today-standard-card>
      }
    </div>
  </section>
}
