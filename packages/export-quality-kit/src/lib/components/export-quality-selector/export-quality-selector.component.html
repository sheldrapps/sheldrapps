<section class="export-quality" [attr.aria-label]="titleKey | translate">
  <div class="field-title export-quality__title">
    {{ titleKey | translate }}
  </div>

  <div
    class="export-quality__item export-quality__item--triple"
    role="radiogroup"
    [attr.aria-label]="titleKey | translate"
  >
    <button
      type="button"
      class="export-quality__option"
      *ngFor="let mode of modes"
      [class.export-quality__option--active]="isModeSelected(mode)"
      [class.export-quality__option--inactive]="!isModeSelected(mode)"
      [class.export-quality__option--locked]="isModeLocked(mode)"
      [attr.aria-pressed]="isModeSelected(mode)"
      [attr.aria-label]="getModeLabelKey(mode) | translate"
      (click)="onModeSelect(mode)"
    >
      <ion-icon
        class="export-quality__option-icon"
        [name]="getModeIconName(mode)"
        aria-hidden="true"
      ></ion-icon>
      <span class="export-quality__option-text">{{
        getModeLabelKey(mode) | translate
      }}</span>
      <span class="export-quality__badge" *ngIf="isModeLocked(mode)">{{
        proOnlyKey | translate
      }}</span>
    </button>
  </div>
</section>
