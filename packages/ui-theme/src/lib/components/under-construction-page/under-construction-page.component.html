<ion-header [translucent]="true">
  <ion-toolbar class="safe-top-toolbar">
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="backHref"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ texts().UI_THEME.UNDER_CONSTRUCTION.TITLE }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="under-construction" [fullscreen]="true">
  <div class="under-construction__shell">
    <section class="under-construction__content" aria-labelledby="under-construction-title">
      <h2 id="under-construction-title" class="under-construction__title">
        {{ texts().UI_THEME.UNDER_CONSTRUCTION.TITLE }}
      </h2>

      <div class="under-construction__icon-wrap" aria-hidden="true">
        <ion-icon name="construct-outline"></ion-icon>
      </div>

      <p class="under-construction__body">
        {{ texts().UI_THEME.UNDER_CONSTRUCTION.BODY }}
      </p>
    </section>
  </div>
</ion-content>
