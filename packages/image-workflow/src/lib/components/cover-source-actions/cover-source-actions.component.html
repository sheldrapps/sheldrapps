@if (visibleActionCount > 0) {
@if (showTitle) {
<div class="field-title">
  {{ resolvedTitleKey | translate }}
</div>
}

<ion-grid class="app-action-grid" [attr.data-tour-id]="tourId || null">
  <ion-row>
    @if (!imageHidden) {
    <ion-col [size]="actionColSize">
      <ion-button
        expand="block"
        fill="outline"
        [disabled]="imageDisabled"
        (click)="onSelectImage()"
        [attr.aria-label]="'COVER_SOURCE.ARIA.SELECT_IMAGE' | translate"
        [class.suggested-action--active]="isSuggestedAction('image')"
      >
        <ion-icon slot="start" name="image-outline" aria-hidden="true"></ion-icon>
        {{ "COVER_SOURCE.ACTIONS.IMAGE" | translate }}
      </ion-button>
    </ion-col>
    }

    @if (!scratchHidden) {
    <ion-col [size]="actionColSize">
      <ion-button
        expand="block"
        fill="outline"
        [disabled]="scratchDisabled"
        (click)="onSelectScratch()"
        [attr.aria-label]="'COVER_SOURCE.ARIA.START_SCRATCH' | translate"
        [class.suggested-action--active]="isSuggestedAction('scratch')"
      >
        <ion-icon
          slot="start"
          name="pencil-outline"
          aria-hidden="true"
        ></ion-icon>
        {{ "COVER_SOURCE.ACTIONS.SCRATCH" | translate }}
      </ion-button>
    </ion-col>
    }
  </ion-row>
</ion-grid>
}
