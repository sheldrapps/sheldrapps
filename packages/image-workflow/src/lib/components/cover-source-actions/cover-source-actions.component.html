<ion-grid
  class="app-action-grid ion-margin-top"
  [attr.data-tour-id]="tourId || null"
>
  <ion-row>
    <ion-col size="6">
      <ion-button
        expand="block"
        fill="outline"
        [disabled]="imageDisabled"
        (click)="onSelectImage()"
        [attr.aria-label]="'COVER_SOURCE.ARIA.SELECT_IMAGE' | translate"
      >
        {{ "COVER_SOURCE.ACTIONS.IMAGE" | translate }}
      </ion-button>
    </ion-col>
    <ion-col size="6">
      <ion-button
        expand="block"
        fill="outline"
        [disabled]="scratchDisabled"
        (click)="onSelectScratch()"
        [attr.aria-label]="'COVER_SOURCE.ARIA.START_SCRATCH' | translate"
      >
        {{ "COVER_SOURCE.ACTIONS.SCRATCH" | translate }}
      </ion-button>
    </ion-col>
  </ion-row>
</ion-grid>
