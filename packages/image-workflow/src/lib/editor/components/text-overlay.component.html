<div #overlay class="text-overlay" [attr.data-redraw]="redrawTick()">
  @for (view of textViews(); track view.layer.id) {
    <div
      class="text-layer"
      [class.text-layer--editing]="view.isEditingActive"
      [class.text-layer--autoedit]="isEditing(view.layer.id) && !view.layer.userBoxTouched"
      [class.text-layer--fixed]="!!view.layer.maxWidthPx"
      [class.text-layer--dragging]="draggingId() === view.layer.id"
      [style.left.px]="view.x"
      [style.top.px]="view.y"
      [style.fontFamily]="view.layer.fontFamily"
      [style.fontSize.px]="view.layer.fontSizePx"
      [style.color]="view.layer.fillColor"
      [style.width.px]="view.displayWidth"
      [style.height.px]="(view.isEditingActive && !view.layer.userBoxTouched) ? 150 : view.displayHeight"
      [attr.data-text-id]="view.layer.id"
      [style.pointer-events]="canInteract() || view.isEditingActive ? 'auto' : 'none'"
      (pointerdown)="onPointerDown($event, view.layer.id)"
      (pointermove)="onPointerMove($event, view.layer.id)"
      (pointerup)="onPointerUp($event, view.layer.id)"
      (pointercancel)="onPointerUp($event, view.layer.id)"
      (dblclick)="onDblClick($event, view.layer.id)"
    >
      <div
        class="text-layer__content"
        [class.is-hidden]="view.isEditingActive"
        [style.maxWidth.px]="view.effectiveContentMaxWidth"
        [ngStyle]="{
          '-webkit-text-stroke-color': view.layer.strokeColor,
          '-webkit-text-stroke-width': view.layer.strokeWidthPx + 'px'
        }"
      >
        {{ view.isEditingActive ? draftContent(view.layer.id) : view.layer.content }}
      </div>
      <textarea
        class="text-layer__editor"
        [class.is-hidden]="!view.isEditingActive"
        [attr.data-editor-for]="view.layer.id"
        [attr.wrap]="view.effectiveContentMaxWidth ? 'soft' : 'off'"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        [style.maxWidth.px]="view.effectiveContentMaxWidth"
        [style.height.px]="(view.isEditingActive && !view.layer.userBoxTouched) ? 150 : null"
        [style.maxHeight.px]="(view.isEditingActive && !view.layer.userBoxTouched) ? 150 : view.displayHeight"
        [ngStyle]="{
          '-webkit-text-stroke-color': view.layer.strokeColor,
          '-webkit-text-stroke-width': view.layer.strokeWidthPx + 'px'
        }"
        (input)="onDraftInput($event, view.layer.id)"
        (keydown)="onEditorKeydown($event)"
        (blur)="onEditorBlur()"
        (pointerdown)="$event.stopPropagation()"
      ></textarea>
    </div>
  }

  @if (selectedRect()) {
    <div
      class="text-selection"
      [class.text-selection--hidden]="!!resizingId()"
      [style.left.px]="selectedRect()?.x"
      [style.top.px]="selectedRect()?.y"
      [style.width.px]="selectedRect()?.w"
      [style.height.px]="selectedRect()?.h"
    ></div>
    <div
      class="text-selection__handle"
      [style.left.px]="(selectedRect()?.x ?? 0) + (selectedRect()?.w ?? 0)"
      [style.top.px]="(selectedRect()?.y ?? 0) + (selectedRect()?.h ?? 0)"
      (pointerdown)="onBoxResizeStart($event)"
      (pointermove)="onBoxResizeMove($event)"
      (pointerup)="onBoxResizeEnd($event)"
      (pointercancel)="onBoxResizeEnd($event)"
    >
      <ion-icon name="resize-outline" class="text-selection__icon text-selection__icon--expand" aria-hidden="true"></ion-icon>
    </div>
    <div
      class="text-selection__handle text-selection__handle--horizontal"
      [style.left.px]="(selectedRect()?.x ?? 0) + (selectedRect()?.w ?? 0)"
      [style.top.px]="(selectedRect()?.y ?? 0) + ((selectedRect()?.h ?? 0) / 2)"
      (pointerdown)="onWidthResizeStart($event)"
      (pointermove)="onWidthResizeMove($event)"
      (pointerup)="onWidthResizeEnd($event)"
      (pointercancel)="onWidthResizeEnd($event)"
    >
      <ion-icon name="swap-horizontal-outline" aria-hidden="true"></ion-icon>
    </div>
    <button
      type="button"
      class="text-selection__handle text-selection__handle--delete"
      [style.left.px]="(selectedRect()?.x ?? 0) + (selectedRect()?.w ?? 0)"
      [style.top.px]="selectedRect()?.y"
      aria-label="Delete text"
      (pointerdown)="$event.stopPropagation()"
      (click)="onDeleteClick($event, selectedTextId())"
    >
      <ion-icon name="close-outline" aria-hidden="true"></ion-icon>
    </button>
  }

  @if (guides().draggingId) {
    <div class="guides">
      <div
        class="guide guide--v guide--stage"
        [class.active]="guides().stageVActive"
        [style.left.px]="guides().stageCenterX"
      ></div>
      <div
        class="guide guide--h guide--stage"
        [class.active]="guides().stageHActive"
        [style.top.px]="guides().stageCenterY"
      ></div>
      @if (guides().otherVLine !== null) {
        <div
          class="guide guide--v active"
          [style.left.px]="guides().otherVLine"
        ></div>
      }
      @if (guides().otherHLine !== null) {
        <div
          class="guide guide--h active"
          [style.top.px]="guides().otherHLine"
        ></div>
      }
    </div>
  }
</div>
