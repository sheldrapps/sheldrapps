<ion-item>
  <ion-label>
    {{
      "EDITOR.PANELS.ADJUSTMENTS.ADJUSTMENTS.REGISTRY.TITLE.SHARPNESS"
        | translate
    }}
  </ion-label>
  <ion-range
    min="0"
    max="1"
    step="0.01"
    [value]="history.sharpness()"
    (ionInput)="onSharpnessChange($event)"
    (ionKnobMoveStart)="history.onSliderStart()"
    (ionKnobMoveEnd)="history.onSliderEnd()"
    [attr.aria-label]="'EDITOR.PANELS.ADJUSTMENTS.ADJUSTMENTS.REGISTRY.TITLE.SHARPNESS' | translate"
  ></ion-range>
</ion-item>

<ion-item lines="none">
  <ion-label class="sharpness-helper">
    {{
      "EDITOR.PANELS.ADJUSTMENTS.WIDGETS.SHARPNESS_PANEL.HELPER"
        | translate
    }}
  </ion-label>
</ion-item>
