<ion-radio-group [value]="selectedValue" (ionChange)="onGroupChange($event.detail.value)">
  <ion-item
    *ngFor="let option of options; trackBy: trackByCode"
    button
    detail="false"
    class="app-choice-row app-choice-row--radio"
    (click)="onItemClick(option.code)"
  >
    <ion-radio
      slot="start"
      class="app-choice-row__control"
      [value]="option.code"
    ></ion-radio>
    <span
      *ngIf="option.flagClass"
      class="app-language-option__flag"
      [ngClass]="option.flagClass"
      aria-hidden="true"
    ></span>
    <ion-label class="app-choice-row__label">{{ option.label }}</ion-label>
  </ion-item>
</ion-radio-group>
